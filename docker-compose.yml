services:
  certs:
    build: .
    user: '0:0'
    entrypoint:
      [
        '/usr/local/bin/certgen',
        '-dir',
        '/certs',
        '-server-names',
        'server,server-shard-1,localhost',
      ]
    volumes:
      - certs:/certs
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: uav
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-uav}'
      POSTGRES_DB: uav
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U uav -d uav']
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--jetstream', '--store_dir', '/data', '--http_port', '8222']
    volumes:
      - natsdata:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:8222/healthz | grep -q ok']
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    entrypoint: ['/usr/local/bin/server']
    environment:
      GRPC_ADDR: ':50051'
      HTTP_ADDR: ':8080'
      NATS_URL: 'nats://nats:4222'
      WORKER_COUNT: '8'
      QUEUE_SIZE: '1024'
      STATE_TTL: '30s'
      PARTITION_COUNT: '${PARTITION_COUNT:-4}'
      INSTANCE_ID: 's0'
      SERVE_LIVE_API: 'true'
      MAX_CONCURRENT_STREAMS: '${MAX_CONCURRENT_STREAMS:-512}'
      INGEST_TOKEN: '${INGEST_TOKEN:-dev-ingest-token}'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      TLS_CA_CERT: '/certs/ca.crt'
      TLS_SERVER_CERT: '/certs/server.crt'
      TLS_SERVER_KEY: '/certs/server.key'
    volumes:
      - certs:/certs:ro
    ports:
      - '50051:50051'
      - '8080:8080'
    depends_on:
      nats:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', '/usr/local/bin/server', '-healthcheck']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: on-failure

  server-shard-1:
    build: .
    entrypoint: ['/usr/local/bin/server']
    environment:
      GRPC_ADDR: ':50051'
      HTTP_ADDR: ':8080'
      NATS_URL: 'nats://nats:4222'
      WORKER_COUNT: '8'
      QUEUE_SIZE: '1024'
      STATE_TTL: '30s'
      PARTITION_COUNT: '${PARTITION_COUNT:-4}'
      INSTANCE_ID: 's1'
      SERVE_LIVE_API: 'false'
      MAX_CONCURRENT_STREAMS: '${MAX_CONCURRENT_STREAMS:-512}'
      INGEST_TOKEN: '${INGEST_TOKEN:-dev-ingest-token}'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      TLS_CA_CERT: '/certs/ca.crt'
      TLS_SERVER_CERT: '/certs/server.crt'
      TLS_SERVER_KEY: '/certs/server.key'
    volumes:
      - certs:/certs:ro
    depends_on:
      nats:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', '/usr/local/bin/server', '-healthcheck']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: on-failure

  geofence:
    build: .
    entrypoint: ['/usr/local/bin/geofence']
    environment:
      NATS_URL: 'nats://nats:4222'
      POSTGRES_DSN: 'postgres://uav:${POSTGRES_PASSWORD:-uav}@postgres:5432/uav'
      HTTP_ADDR: ':8081'
      WORKER_COUNT: '8'
      QUEUE_SIZE: '256'
      HISTORY_RETENTION: '24h'
      BATCH_SIZE: '100'
      FLUSH_INTERVAL: '1s'
      SWARM_RADIUS_METERS: '${SWARM_RADIUS_METERS:-5000}'
      SWARM_MIN_SIZE: '${SWARM_MIN_SIZE:-3}'
      INGEST_SERVER_ADDR: 'server:50051'
      INGEST_TOKEN: '${INGEST_TOKEN:-dev-ingest-token}'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      REPLICA_ID: 'geofence-0'
      SHARD_INDEX: '0'
      SHARD_COUNT: '${SHARD_COUNT:-2}'
      PARTITION_COUNT: '${PARTITION_COUNT:-4}'
      TLS_CA_CERT: '/certs/ca.crt'
      TLS_CLIENT_CERT: '/certs/client.crt'
      TLS_CLIENT_KEY: '/certs/client.key'
    volumes:
      - certs:/certs:ro
    ports:
      - '8081:8081'
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', '/usr/local/bin/geofence', '-healthcheck']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: on-failure

  geofence-shard-1:
    build: .
    entrypoint: ['/usr/local/bin/geofence']
    environment:
      NATS_URL: 'nats://nats:4222'
      POSTGRES_DSN: 'postgres://uav:${POSTGRES_PASSWORD:-uav}@postgres:5432/uav'
      HTTP_ADDR: ':8081'
      WORKER_COUNT: '8'
      QUEUE_SIZE: '256'
      HISTORY_RETENTION: '24h'
      BATCH_SIZE: '100'
      FLUSH_INTERVAL: '1s'
      SWARM_RADIUS_METERS: '${SWARM_RADIUS_METERS:-5000}'
      SWARM_MIN_SIZE: '${SWARM_MIN_SIZE:-3}'
      INGEST_SERVER_ADDR: 'server:50051'
      INGEST_TOKEN: '${INGEST_TOKEN:-dev-ingest-token}'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://jaeger:4317'
      REPLICA_ID: 'geofence-1'
      SHARD_INDEX: '1'
      SHARD_COUNT: '${SHARD_COUNT:-2}'
      PARTITION_COUNT: '${PARTITION_COUNT:-4}'
      TLS_CA_CERT: '/certs/ca.crt'
      TLS_CLIENT_CERT: '/certs/client.crt'
      TLS_CLIENT_KEY: '/certs/client.key'
    volumes:
      - certs:/certs:ro
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', '/usr/local/bin/geofence', '-healthcheck']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - '4200:80'
    depends_on:
      server:
        condition: service_healthy
      geofence:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/ || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    restart: on-failure

  simulator:
    build: .
    entrypoint: ['/usr/local/bin/simulator']
    environment:
      SERVER_ADDRS: '${SERVER_ADDRS:-server:50051,server-shard-1:50051}'
      DRONE_COUNT: '${DRONE_COUNT:-10}'
      STATION_COUNT: '${STATION_COUNT:-3}'
      OBS_NOISE_METERS: '${OBS_NOISE_METERS:-80}'
      SWARM_SIZE: '${SWARM_SIZE:-4}'
      SEND_INTERVAL: '${SEND_INTERVAL:-500ms}'
      INGEST_TOKEN: '${INGEST_TOKEN:-dev-ingest-token}'
      TLS_CA_CERT: '/certs/ca.crt'
      TLS_CLIENT_CERT: '/certs/client.crt'
      TLS_CLIENT_KEY: '/certs/client.key'
    volumes:
      - certs:/certs:ro
    depends_on:
      server:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: on-failure

  jaeger:
    image: jaegertracing/jaeger:2.20.0
    ports:
      - '16686:16686'
      - '4317:4317'
    security_opt:
      - no-new-privileges:true
    restart: on-failure

  prometheus:
    image: prom/prometheus:v3.13.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=24h'
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - promdata:/prometheus
    ports:
      - '9090:9090'
    depends_on:
      server:
        condition: service_healthy
      geofence:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'promtool', 'check', 'healthy', '--url=http://localhost:9090']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: on-failure

  alertmanager:
    image: prom/alertmanager:v0.33.1
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - '9093:9093'
    security_opt:
      - no-new-privileges:true
    restart: on-failure

  grafana:
    image: grafana/grafana:12.2.10
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Viewer'
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_ADMIN_PASSWORD:-admin}'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - '3000:3000'
    depends_on:
      prometheus:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: on-failure

volumes:
  pgdata:
  natsdata:
  promdata:
  grafanadata:
  certs:
