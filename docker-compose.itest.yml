services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: uav
      POSTGRES_PASSWORD: uav
      POSTGRES_DB: uav
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U uav -d uav']
      interval: 3s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ['--jetstream', '--http_port', '8222']
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:8222/healthz | grep -q ok']
      interval: 3s
      timeout: 3s
      retries: 10
