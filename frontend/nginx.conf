limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://tile.openstreetmap.org https://*.tile.openstreetmap.org; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  gzip on;
  gzip_min_length 1024;
  gzip_types application/json application/geo+json application/javascript text/css;

  location /api/stream {
    proxy_pass http://server:8080/events;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location /api/alert-stream {
    proxy_pass http://geofence:8081/events;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location /api/zones {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://geofence:8081/zones;
  }

  location /api/alerts {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://geofence:8081/alerts;
  }

  location /api/history {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://geofence:8081/history;
  }

  location /api/breaches {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://geofence:8081/breaches;
  }

  location /api/custom-zones {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://geofence:8081/custom-zones;
  }

  location /api/ {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://server:8080/;
  }

  location / {
    try_files $uri /index.html;
  }
}
