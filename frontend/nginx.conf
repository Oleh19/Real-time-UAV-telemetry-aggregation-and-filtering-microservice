server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_min_length 1024;
  gzip_types application/json application/geo+json application/javascript text/css;

  location /api/stream {
    proxy_pass http://server:8080/events;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location /api/alert-stream {
    proxy_pass http://geofence:8081/events;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location /api/zones {
    proxy_pass http://geofence:8081/zones;
  }

  location /api/alerts {
    proxy_pass http://geofence:8081/alerts;
  }

  location /api/ {
    proxy_pass http://server:8080/;
  }

  location / {
    try_files $uri /index.html;
  }
}
